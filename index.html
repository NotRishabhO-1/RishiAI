<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rishi AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-mark">R</div>
        <div>
          <div class="brand-title">Rishi AI</div>
          <div class="brand-subtitle">Elegant assistant</div>
        </div>
      </div>

      <button id="newChatBtn" class="new-chat-btn" type="button">
        <span>＋</span> New chat
      </button>

      <div class="sidebar-section">
        <div class="section-label">Chats</div>
        <div id="chatList" class="chat-list"></div>
      </div>

      <div class="sidebar-footer">
        <div class="footer-note">
          Profile: <span id="activeProfileLabel">Guest</span>
        </div>
        <button id="settingsBtn" class="settings-btn" type="button" aria-label="Open settings">⚙</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="sidebarToggle" class="icon-btn" type="button" aria-label="Open sidebar">☰</button>
        <h1 id="chatTitle" class="center-title">New chat</h1>
        <div class="topbar-spacer"></div>
      </header>

      <section id="messages" class="messages"></section>

      <div class="composer-wrap">
        <div class="composer">
<textarea id="promptInput" rows="1" placeholder="Message Rishi AI..."></textarea>

          <button id="micBtn" class="mic-btn" type="button" aria-label="Toggle voice replies">🎙</button>
          <button id="sendBtn" class="send-btn" type="button">Send</button>
        </div>
        <div class="composer-hint">Enter to send • Shift+Enter for newline</div>
      </div>
    </main>
  </div>

  <div id="settingsModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2>AI personality</h2>
          <p>Customize tone and behavior for this profile.</p>
        </div>
        <button id="settingsClose" class="modal-close" type="button" aria-label="Close settings">×</button>
      </div>

      <form id="settingsForm" class="modal-form">
        <label class="field">
          <span>Profile name</span>
          <input id="profileNameInput" type="text" maxlength="40" placeholder="Guest" />
        </label>

        <label class="field">
          <span>Personality preset</span>
          <select id="personalityPresetSelect">
            <option value="friendly">Friendly</option>
            <option value="professional">Professional</option>
            <option value="creative">Creative</option>
            <option value="tutor">Tutor</option>
            <option value="coding">Coding</option>
          </select>
        </label>


        <label class="field">
          <span>Image model</span>
          <select id="imageProviderSelect">
            <option value="gemini">Gemini</option>
            <option value="stable">Stable Diffusion 3 Medium</option>
          </select>
        </label>

        <label class="field">
          <span>Custom instructions</span>
          <textarea id="customInstructionsInput" rows="6" placeholder="Add special tone, rules, or style instructions..."></textarea>
        </label>

        <div class="modal-actions">
          <button id="resetSettingsBtn" type="button" class="ghost-btn">Reset</button>
          <button id="saveSettingsBtn" type="submit" class="primary-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
